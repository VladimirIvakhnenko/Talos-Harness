services:

  # ── PostgreSQL 17 + pgvector ───────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg17
    container_name: plc_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-plc}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-plc_secret}
      POSTGRES_DB: ${POSTGRES_DB:-plc_agent}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-plc} -d ${POSTGRES_DB:-plc_agent}"]
      interval: 5s
      timeout: 5s
      retries: 15

  # ── llama.cpp — локальные эмбеддинги (GGUF из ./models) ───────────────────
  llama-embedding:
    image: ghcr.io/ggml-org/llama.cpp:server
    container_name: llama_embedding
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./models:/models:ro
    environment:
      LLAMA_ARG_MODEL: /models/${EMBEDDING_GGUF_FILE:-embeddinggemma-300M-Q8_0.gguf}
      LLAMA_ARG_EMBEDDINGS: "1"
      LLAMA_ARG_HOST: 0.0.0.0
      LLAMA_ARG_PORT: "8080"
      LLAMA_ARG_N_GPU_LAYERS: ${LLAMA_N_GPU_LAYERS:-0}
      LLAMA_ARG_CTX_SIZE: "2048"
      LLAMA_ARG_BATCH: "2048"
      LLAMA_ARG_UBATCH: "2048"
    dns:
      - 127.0.0.11
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 180s

  # ── MatIEC ────────────────────────────────────────────────────────────────
  matiec:
    build:
      context: ./matiec
      dockerfile: Dockerfile
    container_name: plc_matiec
    restart: unless-stopped
    ports:
      - "8001:8001"
    volumes:
      - matiec_work:/tmp/matiec_work
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8001/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s

  # ── FastAPI ─────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: plc_api
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    dns:
      - 127.0.0.11
      - 8.8.8.8
      - 1.1.1.1
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-plc}:${POSTGRES_PASSWORD:-plc_secret}@postgres:5432/${POSTGRES_DB:-plc_agent}
      MATIEC_URL: http://matiec:8001
      OCR_BACKEND: openrouter
      OCR_MODEL: ${OCR_MODEL:-qwen/qwen3-vl-8b-thinking}
      EMBEDDING_BACKEND: local
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-embeddinggemma-300m}
      EMBEDDING_DIMENSIONS: "768"
      EMBEDDING_MAX_CHARS: "1500"
      EMBEDDING_GGUF_FILE: ${EMBEDDING_GGUF_FILE:-embeddinggemma-300M-Q8_0.gguf}
      LLAMA_EMBEDDING_URL: http://llama-embedding:8080
      LMSTUDIO_BASE_URL: ${LMSTUDIO_BASE_URL:-http://host.docker.internal:1234/v1}
    volumes:
      - uploads_data:/app/uploads
      - ./app:/app/app
      - ./benchmark:/app/benchmark
    depends_on:
      postgres:
        condition: service_healthy
      matiec:
        condition: service_healthy
      llama-embedding:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── Gradio UI ───────────────────────────────────────────────────────────
  ui:
    build:
      context: .
      dockerfile: Dockerfile.ui
    container_name: plc_ui
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    dns:
      - 127.0.0.11
      - 8.8.8.8
      - 1.1.1.1
    ports:
      - "7860:7860"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-plc}:${POSTGRES_PASSWORD:-plc_secret}@postgres:5432/${POSTGRES_DB:-plc_agent}
      MATIEC_URL: http://matiec:8001
      OCR_BACKEND: openrouter
      OCR_MODEL: ${OCR_MODEL:-qwen/qwen3-vl-8b-thinking}
      API_BASE_URL: http://api:8000
      GRADIO_SERVER_PORT: "7860"
      UPLOAD_DIR: /app/uploads
      EMBEDDING_BACKEND: local
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-embeddinggemma-300m}
      EMBEDDING_DIMENSIONS: "768"
      EMBEDDING_MAX_CHARS: "1500"
      LLAMA_EMBEDDING_URL: http://llama-embedding:8080
      LMSTUDIO_BASE_URL: ${LMSTUDIO_BASE_URL:-http://host.docker.internal:1234/v1}
    volumes:
      - uploads_data:/app/uploads
      - ./app:/app/app
      - ./ui:/app/ui
      - ./benchmark:/app/benchmark
    depends_on:
      api:
        condition: service_healthy
      llama-embedding:
        condition: service_healthy

volumes:
  postgres_data:
  matiec_work:
  uploads_data:
