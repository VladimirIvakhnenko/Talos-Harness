services:

  # ── PostgreSQL 17 + pgvector ───────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg17
    container_name: plc_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-plc}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-plc_secret}
      POSTGRES_DB: ${POSTGRES_DB:-plc_agent}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-plc} -d ${POSTGRES_DB:-plc_agent}"]
      interval: 5s
      timeout: 5s
      retries: 15

  # ── MatIEC (IEC 61131-3 ST compiler / verifier) ───────────────────────────
  # Собираем из официального репозитория EPITA.
  # После сборки контейнер остаётся запущенным и принимает
  # HTTP-запросы через простой Python wrapper (matiec_server.py).
  matiec:
    build:
      context: ./matiec
      dockerfile: Dockerfile
    container_name: plc_matiec
    restart: unless-stopped
    ports:
      - "8001:8001"
    volumes:
      - matiec_work:/tmp/matiec_work   # рабочая директория для .st файлов
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8001/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── FastAPI приложение ─────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: plc_api
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-plc}:${POSTGRES_PASSWORD:-plc_secret}@postgres:5432/${POSTGRES_DB:-plc_agent}
      MATIEC_URL: http://matiec:8001
    volumes:
      - uploads_data:/app/uploads
      - ./app:/app/app
      - ./benchmark:/app/benchmark
    depends_on:
      postgres:
        condition: service_healthy
      matiec:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
  matiec_work:
  uploads_data: